services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rapidbyte_test
    ports:
      - "5433:5432"
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  registry:
    image: ghcr.io/project-zot/zot-linux-amd64:v2.1.1
    ports:
      - "5050:5000"
    healthcheck:
      test: ["CMD", "/usr/bin/zot", "verify", "/etc/zot/config.json"]
      interval: 3s
      timeout: 5s
      retries: 5
