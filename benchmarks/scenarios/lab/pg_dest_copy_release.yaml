id: pg_dest_copy_release
name: Postgres destination via copy release
suite: lab
kind: pipeline
tags:
  - lab
  - postgres
  - native
  - copy
  - release
connectors:
  - kind: source
    plugin: postgres
  - kind: destination
    plugin: postgres
workload:
  family: narrow_append
  rows: 1000000
execution:
  iterations: 3
  warmups: 1
benchmark:
  build_mode: release
  aot: true
environment:
  ref: local-dev-postgres
  stream_name: bench_events
connector_options:
  source:
    sync_mode: full_refresh
  destination:
    load_method: copy
    write_mode: append
assertions:
  expected_records_read: 1000000
  expected_records_written: 1000000
