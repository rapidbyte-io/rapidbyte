id: local-bench-postgres
provider:
  kind: docker_compose
  project_dir: benchmarks
  project_name: rapidbyte-bench
services:
  postgres:
    kind: postgres
    host: 127.0.0.1
    port: 55433
    user: postgres
    password: postgres
    database: rapidbyte_test
bindings:
  source:
    service: postgres
    schema: public
  destination:
    service: postgres
    schema: raw
