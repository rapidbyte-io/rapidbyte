syntax = "proto3";
package rapidbyte.v1;

import "google/protobuf/timestamp.proto";

// --- Client-facing ---

service PipelineService {
  rpc SubmitPipeline(SubmitPipelineRequest) returns (SubmitPipelineResponse);
  rpc GetRun(GetRunRequest) returns (GetRunResponse);
  rpc WatchRun(WatchRunRequest) returns (stream RunEvent);
  rpc CancelRun(CancelRunRequest) returns (CancelRunResponse);
  rpc ListRuns(ListRunsRequest) returns (ListRunsResponse);
}

// --- Agent-facing ---

service AgentService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Deregister(DeregisterRequest) returns (DeregisterResponse);
  rpc PollTask(PollTaskRequest) returns (PollTaskResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc CompleteTask(CompleteTaskRequest) returns (CompleteTaskResponse);
}

// --- Enums ---

enum RunState {
  RUN_STATE_UNSPECIFIED = 0;
  RUN_STATE_PENDING = 1;
  RUN_STATE_RUNNING = 2;
  RUN_STATE_COMPLETED = 3;
  RUN_STATE_FAILED = 4;
  RUN_STATE_CANCELLED = 5;
}

enum CommitState {
  COMMIT_STATE_UNSPECIFIED = 0;
  COMMIT_STATE_BEFORE_COMMIT = 1;
  COMMIT_STATE_AFTER_COMMIT_UNKNOWN = 2;
  COMMIT_STATE_AFTER_COMMIT_CONFIRMED = 3;
}

// --- Pipeline Service Messages ---

message SubmitPipelineRequest {
  string pipeline_yaml = 1;
  string idempotency_key = 2;
  ExecutionOptions options = 3;
}

message ExecutionOptions {
  uint32 max_retries = 1;
  uint64 timeout_seconds = 2;
}

message SubmitPipelineResponse {
  string run_id = 1;
  bool already_exists = 2;
}

message GetRunRequest {
  string run_id = 1;
}

message GetRunResponse {
  RunDetail run = 1;
}

message WatchRunRequest {
  string run_id = 1;
}

message RunEvent {
  string run_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  RunState state = 3;
  uint32 attempt = 4;
  oneof detail {
    ProgressDetail progress = 5;
    CompletionDetail completed = 6;
    FailureDetail failed = 7;
  }
}

message ProgressDetail {
  string message = 1;
  optional double progress_pct = 2;
}

message CompletionDetail {
  RunMetrics metrics = 1;
}

message FailureDetail {
  string error_code = 1;
  string error_message = 2;
  bool retryable = 3;
  CommitState commit_state = 4;
}

message CancelRunRequest {
  string run_id = 1;
}

message CancelRunResponse {
  bool accepted = 1;
}

message ListRunsRequest {
  optional RunState state_filter = 1;
  uint32 page_size = 2;
  string page_token = 3;
}

message ListRunsResponse {
  repeated RunSummary runs = 1;
  string next_page_token = 2;
}

message RunDetail {
  string run_id = 1;
  string pipeline_name = 2;
  RunState state = 3;
  bool cancel_requested = 4;
  uint32 attempt = 5;
  uint32 max_retries = 6;
  optional RunMetrics metrics = 7;
  optional RunError error = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message RunSummary {
  string run_id = 1;
  string pipeline_name = 2;
  RunState state = 3;
  uint32 attempt = 4;
  google.protobuf.Timestamp created_at = 5;
}

message RunMetrics {
  uint64 rows_read = 1;
  uint64 rows_written = 2;
  uint64 bytes_read = 3;
  uint64 bytes_written = 4;
  uint64 duration_ms = 5;
}

message RunError {
  string code = 1;
  string message = 2;
}

// --- Agent Service Messages ---

message RegisterRequest {
  string agent_id = 1;
  AgentCapabilities capabilities = 2;
}

message AgentCapabilities {
  repeated string plugins = 1;
  uint32 max_concurrent_tasks = 2;
}

message RegisterResponse {
  RegistryInfo registry = 1;
}

message DeregisterRequest {
  string agent_id = 1;
}

message DeregisterResponse {}

message PollTaskRequest {
  string agent_id = 1;
}

message PollTaskResponse {
  oneof result {
    TaskAssignment assignment = 1;
    NoTask no_task = 2;
  }
}

message TaskAssignment {
  string task_id = 1;
  string run_id = 2;
  string pipeline_yaml = 3;
  ExecutionOptions options = 4;
  uint64 lease_epoch = 5;
  google.protobuf.Timestamp lease_expires_at = 6;
  uint32 attempt = 7;
  string operation = 8;
}

message RegistryInfo {
  string url = 1;
  bool insecure = 2;
}

message NoTask {}

message HeartbeatRequest {
  string agent_id = 1;
  repeated TaskHeartbeat tasks = 2;
}

message TaskHeartbeat {
  string task_id = 1;
  uint64 lease_epoch = 2;
  optional string progress_message = 3;
  optional double progress_pct = 4;
}

message HeartbeatResponse {
  repeated TaskDirective directives = 1;
}

message TaskDirective {
  string task_id = 1;
  bool acknowledged = 2;
  bool cancel_requested = 3;
  google.protobuf.Timestamp lease_expires_at = 4;
}

message CompleteTaskRequest {
  string agent_id = 1;
  string task_id = 2;
  uint64 lease_epoch = 3;
  oneof outcome {
    TaskCompleted completed = 4;
    TaskFailed failed = 5;
    TaskCancelled cancelled = 6;
  }
}

message TaskCompleted {
  RunMetrics metrics = 1;
}

message TaskFailed {
  string error_code = 1;
  string error_message = 2;
  bool retryable = 3;
  CommitState commit_state = 4;
}

message TaskCancelled {}

message CompleteTaskResponse {}
